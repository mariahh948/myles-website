<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pitch Deck</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }

    .pdf-container {
        width: 100vw;
        height: 100vh;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        padding: 10px 20px;
        border: 2px solid white;
        color: white;
        background: transparent;
        cursor: pointer;
    }

    .back-btn:hover {
        background: white;
        color: black;
    }
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="pdf-container">
    <iframe src="AOB_Pitch.pdf"></iframe>
</div>

</body>
</html>
